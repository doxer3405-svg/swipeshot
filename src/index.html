<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0d12">
<title>SwipeShot</title>
<style>
:root {
  --bg:#0d0d12;--surface:#151520;--surface2:#1c1c2a;--border:#2c2c3e;
  --text:#edeaf8;--muted:#6e6b85;--accent:#7c5cfc;--accent2:#c084fc;
  --keep:#1fd07a;--del:#ff3d5a;--skip:#f0b429;--radius:22px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;
  padding-top:var(--safe-top);padding-bottom:var(--safe-bot);}

/* Progress */
#progress-wrap{height:3px;background:var(--surface2);flex-shrink:0;}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s ease;}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px;flex-shrink:0;}
.logo{font-size:1.35rem;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(130deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-right{display:flex;gap:10px;align-items:center;}
.pill{display:flex;align-items:center;gap:6px;background:var(--surface2);
  border:1px solid var(--border);border-radius:40px;padding:5px 12px;
  font-size:.72rem;color:var(--muted);}
.pill b{color:var(--text);font-weight:700;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--surface2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;cursor:pointer;position:relative;transition:transform .15s;}
.icon-btn:active{transform:scale(.88);}
.badge{position:absolute;top:-3px;right:-3px;background:var(--del);color:#fff;
  font-size:.58rem;font-weight:800;border-radius:10px;padding:1px 4px;
  min-width:15px;text-align:center;display:none;}
.badge.on{display:block;}

/* Deck */
#deck{flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:4px 14px 0;}

/* Cards */
.card{position:absolute;width:min(340px,90vw);height:min(500px,65vh);
  border-radius:var(--radius);overflow:hidden;cursor:grab;
  transform-origin:50% 115%;will-change:transform;
  box-shadow:0 10px 50px rgba(0,0,0,.7);border:1px solid var(--border);}
.card:active{cursor:grabbing;}
.card.top{z-index:5;box-shadow:0 18px 70px rgba(0,0,0,.8),0 0 0 1px rgba(124,92,252,.15);}
.card:nth-child(2){transform:scale(.95) translateY(14px);z-index:4;}
.card:nth-child(3){transform:scale(.91) translateY(26px);z-index:3;}
.card:nth-child(n+4){transform:scale(.88) translateY(36px);z-index:2;opacity:0;}
.card-img{width:100%;height:100%;object-fit:cover;display:block;
  background:var(--surface2);pointer-events:none;}
.card-img.blur{filter:blur(8px);transform:scale(1.05);}
.card-overlay{position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.3) 65%,rgba(0,0,0,.92) 100%);
  pointer-events:none;}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:36px 18px 18px;pointer-events:none;}
.card-name{font-size:.9rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{font-size:.7rem;color:rgba(255,255,255,.55);margin-top:3px;}
.stamp{position:absolute;padding:7px 14px;border:2.5px solid;border-radius:9px;
  font-size:1rem;font-weight:900;letter-spacing:1px;opacity:0;pointer-events:none;transition:opacity .05s;}
.s-keep{top:24px;left:16px;color:var(--keep);border-color:var(--keep);transform:rotate(-12deg);}
.s-del{top:24px;right:16px;color:var(--del);border-color:var(--del);transform:rotate(12deg);}
.s-skip{top:44%;left:50%;transform:translate(-50%,-50%);color:var(--skip);border-color:var(--skip);}

/* Actions */
#actions{display:flex;align-items:center;justify-content:center;
  gap:16px;padding:12px 20px 16px;flex-shrink:0;}
.act{border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;}
.act:active{transform:scale(.85);}
.act-del{width:60px;height:60px;font-size:1.6rem;
  background:linear-gradient(135deg,#ff3d5a,#c0192f);box-shadow:0 6px 22px rgba(255,61,90,.45);}
.act-keep{width:68px;height:68px;font-size:1.9rem;
  background:linear-gradient(135deg,#1fd07a,#0b8f4e);box-shadow:0 6px 22px rgba(31,208,122,.45);}
.act-skip{width:50px;height:50px;font-size:1.2rem;background:var(--surface2);border:1.5px solid var(--border);}
.act-undo{width:44px;height:44px;font-size:1rem;background:var(--surface2);border:1.5px solid var(--border);}

/* States */
#loader,#empty,#perm-screen{display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;flex:1;text-align:center;padding:24px;}
.spinner{width:46px;height:46px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loader p,#empty p{color:var(--muted);font-size:.9rem;line-height:1.5;max-width:260px;}
#empty .big,#perm-screen .big{font-size:3.2rem;line-height:1;}
#empty h2,#perm-screen h2{font-size:1.35rem;font-weight:800;}
#perm-screen p{color:var(--muted);font-size:.88rem;line-height:1.6;max-width:280px;}
.btn-pill{background:var(--accent);color:#fff;border:none;border-radius:40px;
  padding:12px 30px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-pill:active{opacity:.8;}
.btn-pill-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent);
  border-radius:40px;padding:10px 24px;font-size:.85rem;font-weight:700;cursor:pointer;margin-top:4px;}

/* Fly animations */
.fly-r{animation:flyR .4s cubic-bezier(.5,0,1,.9) forwards;}
.fly-l{animation:flyL .4s cubic-bezier(.5,0,1,.9) forwards;}
.fly-u{animation:flyU .4s cubic-bezier(.5,0,1,.9) forwards;}
@keyframes flyR{to{transform:translateX(130vw) rotate(28deg);opacity:0;}}
@keyframes flyL{to{transform:translateX(-130vw) rotate(-28deg);opacity:0;}}
@keyframes flyU{to{transform:translateY(-110vh);opacity:0;}}

/* Bottom sheet */
.sheet-bg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);
  opacity:0;pointer-events:none;transition:opacity .25s;}
.sheet-bg.on{opacity:1;pointer-events:all;}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);
  border-radius:26px 26px 0 0;border:1px solid var(--border);border-bottom:none;
  max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1.1,.7,1);
  padding-bottom:var(--safe-bot);}
.sheet-bg.on .sheet{transform:translateY(0);}
.handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0;flex-shrink:0;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sheet-head h2{font-size:1.05rem;font-weight:800;}
.close-btn{width:30px;height:30px;background:var(--surface2);border:1px solid var(--border);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;cursor:pointer;}
.sheet-body{flex:1;overflow-y:auto;padding:14px 14px 0;overscroll-behavior:contain;}
.sheet-foot{padding:12px 14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;}
.btn-danger{flex:1;background:var(--del);color:#fff;border:none;border-radius:14px;
  padding:13px;font-size:.88rem;font-weight:700;cursor:pointer;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);
  border-radius:14px;padding:13px 18px;font-size:.88rem;font-weight:600;cursor:pointer;}

/* Trash grid */
.trash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.trash-card{background:var(--surface2);border-radius:16px;overflow:hidden;border:1px solid var(--border);}
.trash-card img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface);}
.trash-info{padding:8px 10px 10px;}
.trash-name{font-size:.72rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.trash-days{font-size:.65rem;color:var(--muted);margin-top:2px;}
.days-red{color:var(--del)!important;}
.btn-restore{width:100%;margin-top:7px;background:transparent;border:1px solid var(--accent);
  border-radius:9px;padding:5px 0;font-size:.72rem;font-weight:700;color:var(--accent);cursor:pointer;}
.btn-restore:active{background:var(--accent);color:#fff;}
.trash-empty-msg{text-align:center;padding:40px 20px;color:var(--muted);font-size:.9rem;}
.trash-empty-msg span{font-size:2.4rem;display:block;margin-bottom:10px;}

/* Toast */
#toasts{position:fixed;top:calc(var(--safe-top) + 60px);left:50%;transform:translateX(-50%);
  z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.toast{background:var(--surface2);border:1px solid var(--border);border-radius:40px;
  padding:9px 20px;font-size:.83rem;font-weight:700;color:var(--text);
  box-shadow:0 8px 30px rgba(0,0,0,.6);white-space:nowrap;
  animation:tin .28s ease,tout .28s ease 2.2s forwards;}
.toast.k{border-color:var(--keep);color:var(--keep);}
.toast.d{border-color:var(--del);color:var(--del);}
.toast.s{border-color:var(--skip);color:var(--skip);}
.toast.o{border-color:var(--accent);color:var(--accent);}
@keyframes tin{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
@keyframes tout{from{opacity:1;}to{opacity:0;}}

/* Counter overlay on card */
.card-counter{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.55);
  border-radius:20px;padding:4px 10px;font-size:.7rem;color:#fff;font-weight:700;}
</style>
</head>
<body>
<div id="app">
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <header>
    <div class="logo">🎴 SwipeShot</div>
    <div class="header-right">
      <div class="pill">📷 <b id="s-left">–</b>&nbsp;✅ <b id="s-kept">–</b></div>
      <div class="icon-btn" id="trash-btn">🗑️<span class="badge" id="badge"></span></div>
    </div>
  </header>

  <!-- Permission -->
  <div id="perm-screen">
    <div class="big">📁</div>
    <h2>Permiso necesario</h2>
    <p>SwipeShot usa el selector de fotos del sistema para acceder a tus imágenes de forma segura.</p>
    <button class="btn-pill" id="pick-btn">📷 Elegir fotos para revisar</button>
    <button class="btn-pill-ghost" id="pick-more-btn" style="display:none">➕ Agregar más fotos</button>
  </div>

  <!-- Loading -->
  <div id="loader">
    <div class="spinner"></div>
    <p id="loader-msg">Cargando fotos…</p>
  </div>

  <!-- Deck -->
  <div id="deck" style="display:none"></div>

  <!-- Empty -->
  <div id="empty" style="display:none">
    <div class="big">🎉</div>
    <h2>¡Todo revisado!</h2>
    <p>No quedan más fotos. Puedes agregar más o revisar la papelera.</p>
    <button class="btn-pill" id="pick-more-btn2">➕ Agregar más fotos</button>
    <button class="btn-pill-ghost" id="reset-btn">🔄 Reiniciar revisión</button>
  </div>

  <!-- Actions -->
  <div id="actions" style="display:none">
    <button class="act act-undo" id="undo-btn">↩️</button>
    <button class="act act-del"  id="del-btn">🗑</button>
    <button class="act act-keep" id="keep-btn">💚</button>
    <button class="act act-skip" id="skip-btn">⏭</button>
  </div>
</div>

<!-- Trash sheet -->
<div class="sheet-bg" id="trash-sheet">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-head">
      <h2>🗑️ Papelera <span id="trash-sub" style="color:var(--muted);font-weight:400;font-size:.85rem;"></span></h2>
      <div class="close-btn" id="close-trash">✕</div>
    </div>
    <div class="sheet-body" id="trash-body"></div>
    <div class="sheet-foot">
      <button class="btn-ghost" id="close-trash2">Cerrar</button>
      <button class="btn-danger" id="purge-btn">Vaciar todo</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script src="capacitor.js"></script>
<script>
'use strict';

// ── Capacitor plugins ──────────────────────────────────────
const CAP       = !!window.Capacitor?.isNativePlatform?.();
const Camera    = window.Capacitor?.Plugins?.Camera;
const Prefs     = window.Capacitor?.Plugins?.Preferences;
const FS        = window.Capacitor?.Plugins?.Filesystem;
const FSDir     = window.Capacitor?.Plugins ? window.Capacitor.Plugins.Filesystem?.Directory ?? {} : {};

// CameraResultType & CameraSource
const CRT = { Uri: 'uri', Base64: 'base64', DataUrl: 'dataUrl' };
const CS  = { Photos: 'PHOTOS', Camera: 'CAMERA', Prompt: 'PROMPT' };

// ── Constants ──────────────────────────────────────────────
const META_KEY     = 'swipeshot_meta_v2';
const RETAIN_MS    = 7 * 86_400_000;

// ── State ──────────────────────────────────────────────────
let images   = [];   // [{webPath, name, blobUrl, kept, skipped}]
let idx      = 0;
let history  = [];
let meta     = { deleted:{}, kept:[], skipped:[] };

// ── Boot ───────────────────────────────────────────────────
async function boot() {
  await loadMeta();
  purgeExpired();

  // If we already have images loaded this session, go to deck
  if (images.length > 0) { render(); return; }

  showState('perm');
}

// ── Meta ───────────────────────────────────────────────────
async function loadMeta() {
  if (!CAP) { meta = { deleted:{}, kept:[], skipped:[] }; return; }
  try {
    const r = await Prefs.get({ key: META_KEY });
    if (r.value) meta = JSON.parse(r.value);
  } catch {}
  meta.deleted ??= {}; meta.kept ??= []; meta.skipped ??= [];
}

async function saveMeta() {
  if (!CAP) return;
  try { await Prefs.set({ key: META_KEY, value: JSON.stringify(meta) }); } catch {}
}

function purgeExpired() {
  const now = Date.now();
  let changed = false;
  for (const [k, v] of Object.entries(meta.deleted)) {
    if (v.deletedAt + RETAIN_MS < now) {
      revokeBlob(v.blobUrl);
      delete meta.deleted[k];
      changed = true;
    }
  }
  if (changed) saveMeta();
}

// ── Pick photos via system Photo Picker (Android 13+) ─────
async function pickPhotos() {
  showState('loader');
  setMsg('Abriendo selector de fotos…');

  if (!CAP) {
    // Browser demo
    await demoBoot();
    return;
  }

  try {
    // GalleryImageOptions — picks multiple from gallery
    const result = await Camera.pickImages({
      quality: 80,
      limit: 0,   // 0 = no limit (pick as many as you want)
    });

    if (!result.photos || result.photos.length === 0) {
      showState('perm');
      return;
    }

    const newImages = [];
    const keptSet    = new Set(meta.kept);
    const skippedSet = new Set(meta.skipped);
    const deletedSet = new Set(Object.keys(meta.deleted));

    for (const photo of result.photos) {
      const id = photo.webPath || photo.path || Math.random().toString(36);
      if (deletedSet.has(id) || keptSet.has(id) || skippedSet.has(id)) continue;
      // Convert webPath to blob URL for display
      let blobUrl = photo.webPath;
      try {
        const resp = await fetch(photo.webPath);
        const blob = await resp.blob();
        blobUrl = URL.createObjectURL(blob);
      } catch {}

      newImages.push({
        id,
        webPath: photo.webPath,
        blobUrl,
        name: photo.webPath?.split('/').pop() ?? `foto_${newImages.length+1}.jpg`,
        size: 0,
      });
    }

    // Merge with existing undecided images
    const existingIds = new Set(images.map(i=>i.id));
    for (const img of newImages) {
      if (!existingIds.has(img.id)) images.push(img);
    }

    idx = 0; history = [];
    render();
  } catch (e) {
    console.error(e);
    toast('Error al abrir fotos', 'd');
    showState('perm');
  }
}

// ── Browser demo ───────────────────────────────────────────
async function demoBoot() {
  images = Array.from({length:16}, (_,i) => ({
    id: `demo_${i}`,
    webPath: `https://picsum.photos/seed/${i+20}/400/600`,
    blobUrl: `https://picsum.photos/seed/${i+20}/400/600`,
    name: `foto_demo_${String(i+1).padStart(3,'0')}.jpg`,
    size: Math.round(Math.random()*4_000_000+500_000),
  }));
  idx=0; history=[];
  render();
}

function revokeBlob(url) {
  if (url && url.startsWith('blob:')) try { URL.revokeObjectURL(url); } catch {}
}

// ── Render deck ────────────────────────────────────────────
function render() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';

  const remaining = images.slice(idx);
  if (remaining.length === 0) {
    showState('empty');
    updateProgress(images.length, images.length);
    return;
  }

  showState('deck');
  updateProgress(idx, images.length);
  updatePill(remaining.length);

  [...remaining.slice(0,4)].reverse().forEach((img, i) => {
    deck.appendChild(buildCard(img, i === Math.min(remaining.length,4)-1));
  });

  attachDrag(deck.querySelector('.top'));
}

function buildCard(img, isTop) {
  const card = document.createElement('div');
  card.className = 'card' + (isTop?' top':'');
  card.dataset.id = img.id;

  const el = document.createElement('img');
  el.className = 'card-img blur';
  el.draggable = false;
  el.onload  = () => el.classList.remove('blur');
  el.onerror = () => { el.style.background='#1a1a2e'; el.classList.remove('blur'); };
  el.src = img.blobUrl;

  const overlay = document.createElement('div');
  overlay.className = 'card-overlay';

  const counter = document.createElement('div');
  counter.className = 'card-counter';
  counter.textContent = `${idx+1} / ${images.length}`;

  const info = document.createElement('div');
  info.className = 'card-info';
  info.innerHTML = `<div class="card-name">${esc(img.name)}</div>
    <div class="card-meta">${img.size?fmtSize(img.size):'📷 Foto'}</div>`;

  const sk = mkStamp('s-keep','💚 GUARDAR');
  const sd = mkStamp('s-del','BORRAR 🗑');
  const ss = mkStamp('s-skip','⏭ SALTAR');

  card.append(el, overlay, counter, info, sk, sd, ss);
  return card;
}

function mkStamp(cls, text) {
  const s = document.createElement('div');
  s.className = `stamp ${cls}`;
  s.textContent = text;
  return s;
}

// ── Drag ──────────────────────────────────────────────────
let dragging=false, sx=0, sy=0, cx=0, cy=0;

function attachDrag(card) {
  if (!card) return;
  const start = (x,y) => { dragging=true; sx=cx=x; sy=cy=y; card.style.transition='none'; };
  const move  = (x,y) => {
    if (!dragging) return;
    cx=x; cy=y;
    const dx=cx-sx, dy=cy-sy;
    card.style.transform=`translate(${dx}px,${dy}px) rotate(${dx*.07}deg)`;
    card.querySelector('.s-keep').style.opacity=Math.max(0,dx/70);
    card.querySelector('.s-del').style.opacity=Math.max(0,-dx/70);
    card.querySelector('.s-skip').style.opacity=Math.max(0,-dy/70)*(Math.abs(dx)<50?1:0);
  };
  const end = () => {
    if (!dragging) return;
    dragging=false;
    const dx=cx-sx, dy=cy-sy;
    card.style.transition='';
    if      (dx >  85) doSwipe('keep');
    else if (dx < -85) doSwipe('del');
    else if (dy < -85 && Math.abs(dx)<55) doSwipe('skip');
    else {
      card.style.transform='';
      card.querySelectorAll('.stamp').forEach(s=>s.style.opacity=0);
    }
  };
  card.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchmove', e=>{const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  card.addEventListener('touchend',  end);
  card.addEventListener('mousedown', e=>start(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>{if(dragging)move(e.clientX,e.clientY);});
  window.addEventListener('mouseup',  ()=>{if(dragging)end();});
}

// ── Swipe ─────────────────────────────────────────────────
async function doSwipe(action) {
  if (idx >= images.length) return;
  const img  = images[idx];
  const card = document.querySelector('.card.top');
  if (!card) return;

  history.push({ img, action });
  card.classList.add(action==='keep'?'fly-r':action==='del'?'fly-l':'fly-u');

  if (action==='keep') {
    toast('💚 Conservada','k');
    if (!meta.kept.includes(img.id)) meta.kept.push(img.id);
    await saveMeta();
  } else if (action==='del') {
    toast('🗑 Eliminada','d');
    // Store in trash (blob URL + metadata)
    meta.deleted[img.id] = {
      id: img.id, name: img.name, blobUrl: img.blobUrl,
      deletedAt: Date.now(), expiresAt: Date.now()+RETAIN_MS,
    };
    await saveMeta();
    updateBadge();
  } else {
    toast('⏭ Saltada','s');
    if (!meta.skipped.includes(img.id)) meta.skipped.push(img.id);
    await saveMeta();
  }

  card.addEventListener('animationend',()=>{ idx++; render(); },{once:true});
}

async function doUndo() {
  if (!history.length) { toast('Nada que deshacer',''); return; }
  const { img, action } = history.pop();
  if (action==='keep')  meta.kept    = meta.kept.filter(x=>x!==img.id);
  if (action==='skip')  meta.skipped = meta.skipped.filter(x=>x!==img.id);
  if (action==='del')   { delete meta.deleted[img.id]; updateBadge(); }
  await saveMeta();
  idx = Math.max(0, idx-1);
  toast('↩️ Deshecho','o');
  render();
}

// ── Buttons ────────────────────────────────────────────────
document.getElementById('pick-btn').onclick      = pickPhotos;
document.getElementById('pick-more-btn').onclick = pickPhotos;
document.getElementById('pick-more-btn2').onclick= pickPhotos;
document.getElementById('keep-btn').onclick      = ()=>doSwipe('keep');
document.getElementById('del-btn').onclick       = ()=>doSwipe('del');
document.getElementById('skip-btn').onclick      = ()=>doSwipe('skip');
document.getElementById('undo-btn').onclick      = doUndo;
document.getElementById('reset-btn').onclick     = async()=>{
  meta.kept=[]; meta.skipped=[]; await saveMeta();
  idx=0; history=[]; render();
};

// ── Trash sheet ────────────────────────────────────────────
document.getElementById('trash-btn').onclick    = openTrash;
document.getElementById('close-trash').onclick  = closeTrash;
document.getElementById('close-trash2').onclick = closeTrash;
document.getElementById('trash-sheet').addEventListener('click',e=>{
  if(e.target===document.getElementById('trash-sheet')) closeTrash();
});

function openTrash() {
  document.getElementById('trash-sheet').classList.add('on');
  renderTrash();
}
function closeTrash() {
  document.getElementById('trash-sheet').classList.remove('on');
}

function renderTrash() {
  const body  = document.getElementById('trash-body');
  const items = Object.values(meta.deleted)
    .map(v=>({...v, daysLeft:Math.max(0,Math.ceil((v.expiresAt-Date.now())/86_400_000))}))
    .sort((a,b)=>b.deletedAt-a.deletedAt);

  document.getElementById('trash-sub').textContent =
    items.length ? `· ${items.length} foto${items.length>1?'s':''}` : '';

  if (!items.length) {
    body.innerHTML='<div class="trash-empty-msg"><span>🧹</span>La papelera está vacía</div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'trash-grid';

  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'trash-card';
    const dc = item.daysLeft<=1?'days-red':'';
    card.innerHTML=`
      <img src="${esc(item.blobUrl||'')}" alt="${esc(item.name)}">
      <div class="trash-info">
        <div class="trash-name">${esc(item.name)}</div>
        <div class="trash-days ${dc}">${item.daysLeft<=0?'Expira hoy':`Expira en ${item.daysLeft}d`}</div>
        <button class="btn-restore" data-id="${esc(item.id)}">↩ Restaurar</button>
      </div>`;

    card.querySelector('.btn-restore').onclick = async function() {
      this.disabled=true; this.textContent='…';
      // Restore: remove from deleted, add back to images queue
      const info = meta.deleted[item.id];
      if (info) {
        // Re-add to images if not already present
        const exists = images.some(i=>i.id===item.id);
        if (!exists) {
          images.splice(idx, 0, {
            id: info.id, name: info.name, blobUrl: info.blobUrl,
            webPath: info.id, size: 0,
          });
        }
        delete meta.deleted[item.id];
        await saveMeta();
      }
      toast('↩️ Restaurada','o');
      updateBadge();
      renderTrash();
    };
    grid.appendChild(card);
  });

  body.innerHTML='';
  body.appendChild(grid);
}

document.getElementById('purge-btn').onclick = async()=>{
  const count = Object.keys(meta.deleted).length;
  if (!count) { toast('La papelera ya está vacía',''); return; }
  if (!confirm(`¿Eliminar ${count} foto${count>1?'s':''} para siempre?\nEsta acción NO se puede deshacer.`)) return;
  Object.values(meta.deleted).forEach(v=>revokeBlob(v.blobUrl));
  meta.deleted={};
  await saveMeta();
  toast(`🔥 ${count} foto${count>1?'s':''} eliminadas definitivamente`,'d');
  updateBadge();
  renderTrash();
};

// ── UI helpers ────────────────────────────────────────────
function showState(s) {
  document.getElementById('loader').style.display       = s==='loader'?'flex':'none';
  document.getElementById('perm-screen').style.display  = s==='perm'  ?'flex':'none';
  document.getElementById('deck').style.display         = s==='deck'  ?'flex':'none';
  document.getElementById('actions').style.display      = s==='deck'  ?'flex':'none';
  document.getElementById('empty').style.display        = s==='empty' ?'flex':'none';
  if (s==='perm') {
    const hasPrev = images.length>0;
    document.getElementById('pick-more-btn').style.display = hasPrev?'block':'none';
  }
}
function setMsg(m){document.getElementById('loader-msg').textContent=m;}
function updateProgress(done,tot){
  document.getElementById('progress-bar').style.width=(tot>0?Math.round(done/tot*100):0)+'%';
}
function updatePill(left){
  document.getElementById('s-left').textContent=left??Math.max(0,images.length-idx);
  document.getElementById('s-kept').textContent=meta.kept.length;
}
function updateBadge(){
  const n=Object.keys(meta.deleted).length;
  const b=document.getElementById('badge');
  b.textContent=n>99?'99+':n;
  n>0?b.classList.add('on'):b.classList.remove('on');
}
function toast(msg,cls){
  const t=document.createElement('div');
  t.className=`toast ${cls}`;t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),2700);
}
function fmtSize(b){
  if(!b)return'';
  if(b>1_048_576)return(b/1_048_576).toFixed(1)+' MB';
  return(b/1024).toFixed(0)+' KB';
}
function esc(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

// ── Keyboard ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(document.getElementById('trash-sheet').classList.contains('on'))return;
  if(e.key==='ArrowRight')doSwipe('keep');
  if(e.key==='ArrowLeft') doSwipe('del');
  if(e.key==='ArrowUp')   doSwipe('skip');
  if(e.key==='z'||e.key==='Z')doUndo();
});

boot();
</script>
</body>
