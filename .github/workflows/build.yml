name: 🎴 Build SwipeShot APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Capacitor add android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      - name: Patch AndroidManifest — Android 13/14/15
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Remove duplicates
          sed -i '/<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE/d' "$MANIFEST"
          sed -i '/<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE/d' "$MANIFEST"
          sed -i '/<uses-permission android:name="android.permission.READ_MEDIA/d' "$MANIFEST"
          sed -i '/<uses-permission android:name="android.permission.READ_MEDIA_VISUAL/d' "$MANIFEST"
          # Inject correct permissions before </manifest>
          sed -i 's|</manifest>|    <!-- Android 6-12 -->\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>\n    <!-- Android 13+ -->\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>\n    <!-- Android 14+ partial access -->\n    <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED"/>\n</manifest>|' "$MANIFEST"
          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"

      - name: Patch build.gradle — SDK versions
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' "$GRADLE"
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' "$GRADLE"
          sed -i 's/minSdkVersion .*/minSdkVersion 26/' "$GRADLE"
          echo "=== build.gradle ==="
          grep -E "compileSdk|targetSdk|minSdk" "$GRADLE"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             output/SwipeShot-v${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwipeShot-APK-v${{ github.run_number }}
          path: output/SwipeShot-v${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "SwipeShot v1.0.${{ github.run_number }}"
          body: |
            ## 🎴 SwipeShot — Android 13/14/15

            1. Descarga el `.apk`
            2. Instala (permite fuentes desconocidas)
            3. Acepta permiso de fotos al abrir
            4. ¡Todas tus fotos aparecen automáticamente!
          files: output/SwipeShot-v${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
