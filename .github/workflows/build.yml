name: Build SwipeShot APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - run: npm ci
      - run: npm run build
      - run: npx cap add android || true
      - run: npx cap sync android
      - name: Patch Manifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          sed -i '/<uses-permission android:name="android.permission.READ_MEDIA/d' "$M"
          sed -i '/<uses-permission android:name="android.permission.READ_EXTERNAL/d' "$M"
          sed -i '/<uses-permission android:name="android.permission.WRITE_EXTERNAL/d' "$M"
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>\n</manifest>|' "$M"
      - name: Patch Gradle
        run: |
          G="android/app/build.gradle"
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' "$G"
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' "$G"
          sed -i 's/minSdkVersion .*/minSdkVersion 26/' "$G"
      - name: Write MediaDeletePlugin
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          python3 write_plugin.py "$MAIN"
          PKG=$(grep -m1 "^package" "$MAIN" | sed 's/package //;s/;//')
          sed -i "s|^package.*;|&\nimport $PKG.MediaDeletePlugin;|" "$MAIN"
          sed -i '/super.onCreate/i\        registerPlugin(MediaDeletePlugin.class);' "$MAIN"
          echo "=== MainActivity ===" && cat "$MAIN"
      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SwipeShot-APK-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SwipeShot v1.0.${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
