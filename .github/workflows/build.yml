name: Build SwipeShot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp src/index.html android/app/src/main/assets/public/index.html

      - name: Update capacitor.plugins.json
        run: |
          cat > android/app/src/main/assets/capacitor.plugins.json << 'EOF'
          [
            {
              "pkg": "@capacitor/preferences",
              "classpath": "com.capacitorjs.plugins.preferences.PreferencesPlugin"
            },
            {
              "pkg": "@odion-cloud/capacitor-mediastore",
              "classpath": "com.odion.capacitor.mediastore.CapacitorMediastorePlugin"
            }
          ]
          EOF

      - name: Update AndroidManifest permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Añadir permisos Android 13/14 si no existen
          if ! grep -q "READ_MEDIA_IMAGES" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"|g' "$MANIFEST"
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED" />\n</manifest>|g' "$MANIFEST"
          fi

      - name: Grant execute permission to gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwipeShot-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
