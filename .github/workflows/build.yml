name: Build SwipeShot APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - run: npm ci
      - run: npm run build
      - run: npx cap add android || true
      - run: npx cap sync android
      - name: Patch Manifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/><uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED"/><uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/><uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/></manifest>|' "$M"
      - name: Patch Gradle
        run: |
          G="android/app/build.gradle"
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' "$G"
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' "$G"
          sed -i 's/minSdkVersion .*/minSdkVersion 26/' "$G"
      - name: Add MediaDeletePlugin
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          PKG=$(grep -m1 "^package" "$MAIN" | sed 's/package //;s/;//')
          DIR="android/app/src/main/java/$(echo $PKG | tr '.' '/')"
          printf 'package %s;\nimport android.app.Activity;\nimport android.content.Intent;\nimport android.net.Uri;\nimport android.os.Build;\nimport android.provider.MediaStore;\nimport com.getcapacitor.JSObject;\nimport com.getcapacitor.Plugin;\nimport com.getcapacitor.PluginCall;\nimport com.getcapacitor.PluginMethod;\nimport com.getcapacitor.annotation.ActivityCallback;\nimport com.getcapacitor.annotation.CapacitorPlugin;\nimport java.util.Collections;\n@CapacitorPlugin(name="MediaDelete")\npublic class MediaDeletePlugin extends Plugin {\nprivate PluginCall pendingCall=null;\n@PluginMethod\npublic void deleteMedia(PluginCall call){\nString u=call.getString("uri");\nif(u==null){call.reject("no uri");return;}\nUri uri=Uri.parse(u);\ntry{\nif(Build.VERSION.SDK_INT>=Build.VERSION_CODES.R){\nandroid.app.PendingIntent pi=MediaStore.createDeleteRequest(getContext().getContentResolver(),Collections.singletonList(uri));\npendingCall=call;\nstartIntentSenderForResult(pi.getIntentSender(),"deleteResult",new Intent(),0,0,0,null);\n}else{\nint r=getContext().getContentResolver().delete(uri,null,null);\nJSObject ret=new JSObject();ret.put("success",r>0);call.resolve(ret);\n}\n}catch(android.app.RecoverableSecurityException e){\npendingCall=call;\ntry{startIntentSenderForResult(e.getUserAction().getActionIntent().getIntentSender(),"deleteResult",new Intent(),0,0,0,null);}catch(Exception ex){call.reject(ex.getMessage());}\n}catch(Exception e){call.reject(e.getMessage());}\n}\n@ActivityCallback\nprivate void deleteResult(PluginCall call,com.getcapacitor.PluginResult result){\nif(call==null)return;\nJSObject ret=new JSObject();ret.put("success",result.getResultCode()==Activity.RESULT_OK);call.resolve(ret);pendingCall=null;\n}\n}\n' "$PKG" > "$DIR/MediaDeletePlugin.java"
          sed -i "s|^package.*;|&\nimport $PKG.MediaDeletePlugin;|" "$MAIN"
          sed -i '/super.onCreate/i\        registerPlugin(MediaDeletePlugin.class);' "$MAIN"
      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SwipeShot-APK-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SwipeShot v1.0.${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
