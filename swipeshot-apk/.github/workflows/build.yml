name: 🎴 Build SwipeShot APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java 17 (required by Gradle) ──────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Accept licenses ────────────────────────────────
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # ── 6. Install Node deps ──────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 7. Build www/ folder ──────────────────────────────
      - name: Build web assets
        run: npm run build

      # ── 8. Capacitor sync → copies www into android/ ─────
      - name: Capacitor add android (if needed)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Capacitor sync
        run: npx cap sync android

      # ── 9. Patch AndroidManifest permissions ─────────────
      - name: Patch permissions in AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add storage permissions before </manifest>
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>\n</manifest>|' "$MANIFEST"
          echo "✔ Permissions patched"
          cat "$MANIFEST"

      # ── 10. Build APK ─────────────────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 11. Rename APK ────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             output/SwipeShot-v${{ github.run_number }}.apk
          echo "APK_PATH=output/SwipeShot-v${{ github.run_number }}.apk" >> $GITHUB_ENV

      # ── 12. Upload as artifact ────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwipeShot-APK-v${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # ── 13. Create Release (only on push to main) ─────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "SwipeShot v1.0.${{ github.run_number }}"
          body: |
            ## 🎴 SwipeShot APK

            ### Instalar
            1. Descarga el archivo `.apk`
            2. En Android: **Ajustes → Seguridad → Fuentes desconocidas** ✓
            3. Abre el APK descargado e instala

            ### Gestos
            - ➡️ Deslizar derecha = Conservar
            - ⬅️ Deslizar izquierda = Eliminar
            - ⬆️ Deslizar arriba = Saltar
            - ↩️ Botón deshacer = Revertir última acción

            Las fotos eliminadas se recuperan desde la papelera hasta **7 días** después.
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
